AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Classes Hub backend

Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
  DatabaseUrl:
    Type: String
    NoEcho: true

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        JWT_SECRET: !Ref JwtSecret
        DATABASE_URL: !Ref DatabaseUrl

Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      # Larger payloads for resource uploads streamed through API Gateway.
      BinaryMediaTypes:
        - '*/*'
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization

  # ---- Authorizer (no routes; referenced by Api above) --------------------
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: authorizer/
      Handler: src/handler.handler
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- auth (login is the only unauthenticated route) ---------------------
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: auth/
      Handler: src/handler.handler
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/login
            Method: post
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- tenants (super-admin) ----------------------------------------------
  TenantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: tenants/
      Handler: src/handler.handler
      Events:
        Root:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /tenants, Method: any }
        Proxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /tenants/{proxy+}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- users --------------------------------------------------------------
  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: users/
      Handler: src/handler.handler
      Events:
        Root:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /users, Method: any }
        Proxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /users/{proxy+}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- courses / subjects / batches ---------------------------------------
  CoursesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: courses/
      Handler: src/handler.handler
      Events:
        Courses:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /courses, Method: any }
        CoursesProxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /courses/{proxy+}, Method: any }
        SubjectBatches:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /subjects/{subjectId}/batches, Method: any }
        Batch:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}, Method: any }
        BatchTeachers:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/teachers, Method: any }
        BatchTeacher:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/teachers/{userId}, Method: any }
        BatchEnrollments:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/enrollments, Method: any }
        BatchEnrollment:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/enrollments/{studentId}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- tests (question bank, tests, attempts) -----------------------------
  TestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: tests/
      Handler: src/handler.handler
      Events:
        Questions:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /questions, Method: any }
        QuestionsProxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /questions/{proxy+}, Method: any }
        Tests:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /tests, Method: any }
        TestsProxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /tests/{proxy+}, Method: any }
        AttemptsProxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /attempts/{proxy+}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- timetable (per-batch sessions) -------------------------------------
  TimetableFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: timetable/
      Handler: src/handler.handler
      Events:
        Sessions:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/sessions, Method: any }
        Session:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/sessions/{sessionId}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- notifications (announcements) --------------------------------------
  NotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: notifications/
      Handler: src/handler.handler
      Events:
        Root:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /announcements, Method: any }
        Proxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /announcements/{proxy+}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- uploads (S3 presign) -----------------------------------------------
  UploadsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: uploads/
      Handler: src/handler.handler
      Environment:
        Variables:
          UPLOADS_BUCKET: !Ref UploadsBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
      Events:
        Proxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /uploads/{proxy+}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- resources (bytea uploads + links) ----------------------------------
  ResourcesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: resources/
      Handler: src/handler.handler
      # Large binary bodies stored to Postgres; give this one more room.
      Timeout: 29
      MemorySize: 512
      Events:
        Root:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /resources, Method: any }
        Proxy:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /resources/{proxy+}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- syllabus (chapters + coverage) -------------------------------------
  SyllabusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: syllabus/
      Handler: src/handler.handler
      Events:
        Chapters:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /subjects/{subjectId}/chapters, Method: any }
        Chapter:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /subjects/{subjectId}/chapters/{chapterId}, Method: any }
        Coverage:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/coverage, Method: any }
        CoverageEntry:
          Type: Api
          Properties: { RestApiId: !Ref Api, Path: /batches/{batchId}/coverage/{coverageId}, Method: any }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/handler.ts]

  # ---- S3 bucket for test/question image uploads --------------------------
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, PUT]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']

Outputs:
  ApiUrl:
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/dev/"
  UploadsBucketName:
    Value: !Ref UploadsBucket
